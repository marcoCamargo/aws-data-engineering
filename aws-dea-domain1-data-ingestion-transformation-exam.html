<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS DEA Domain 1 – Data Ingestion & Transformation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct-bg: rgba(34,197,94,0.08);
    --correct-border: rgba(34,197,94,0.3);
    --wrong-bg: rgba(239,68,68,0.06);
    --wrong-border: rgba(239,68,68,0.2);
    --selected-bg: rgba(249,115,22,0.1);
    --selected-border: rgba(249,115,22,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .aws-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  header h1 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  header .sub {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .score-pill {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
  }
  #score-num { font-weight: 700; }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    width: 100%;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
    transition: border-color 0.25s;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--border);
    transition: background 0.3s;
  }
  .q-card.answered::before { background: var(--accent); }
  .q-card.correct-card::before { background: var(--green); }

  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 15.5px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.7;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
    background: var(--bg);
    position: relative;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--selected-bg);
  }
  .option.selected {
    border-color: var(--selected-border);
    background: var(--selected-bg);
  }
  .option.correct {
    border-color: var(--correct-border);
    background: var(--correct-bg);
  }
  .option.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
  }
  .option.disabled { cursor: default; pointer-events: none; }

  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.18s;
    margin-top: 1px;
  }
  .option.correct .option-letter {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .option.wrong .option-letter {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .option.selected:not(.correct):not(.wrong) .option-letter {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .option-text { font-size: 14.5px; color: var(--text); line-height: 1.5; }

  .icon-mark {
    margin-left: auto;
    min-width: 18px;
    opacity: 0;
    font-size: 16px;
    transition: opacity 0.2s;
  }
  .option.correct .icon-mark,
  .option.wrong .icon-mark { opacity: 1; }

  /* ── FEEDBACK ── */
  .feedback {
    display: none;
    margin-top: 20px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .feedback.show { display: block; }

  .feedback-header {
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 600;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-header.ok { background: rgba(34,197,94,0.12); color: var(--green); }
  .feedback-header.fail { background: rgba(239,68,68,0.1); color: var(--red); }

  .feedback-body {
    padding: 16px;
    background: var(--surface2);
  }
  .feedback-body p {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 8px;
  }
  .feedback-body p:last-child { margin-bottom: 0; }
  .feedback-body strong { color: var(--text); }
  .feedback-body .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 6px;
    font-weight: 600;
  }
  .tag.correct-tag { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag.incorrect-tag { background: rgba(239,68,68,0.12); color: var(--red); }

  /* ── RESULTS PANEL ── */
  #results-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin-bottom: 32px;
  }
  #results-panel.show { display: block; }
  #results-panel h2 {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  #results-panel .final-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin: 16px 0;
  }
  #results-panel .final-score span { color: var(--accent); }
  #results-panel p { color: var(--muted); font-size: 14px; }
  .btn-reset {
    margin-top: 24px;
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: var(--accent2); }

  @media (max-width: 600px) {
    header { padding: 16px; flex-wrap: wrap; }
    main { padding: 20px 12px 60px; }
    .q-card { padding: 20px; }
    #results-panel { padding: 24px; }
    .final-score { font-size: 40px !important; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="aws-badge">AWS DEA-C01</div>
  </div>
  <div>
    <h1>Data Ingestion &amp; Transformation</h1>
    <div class="sub">Domain 1 · Practice Exam · Marco Antonio Camargo Funez</div>
  </div>
  <div class="score-pill">Score: <span id="score-num">0</span> / <span id="total-num">0</span></div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

<main>
  <div id="results-panel">
    <h2>¡Examen completado!</h2>
    <div class="final-score"><span id="final-correct">0</span> / <span id="final-total">0</span></div>
    <p id="final-pct"></p>
    <button class="btn-reset" onclick="resetExam()">Reiniciar examen</button>
  </div>
  <div id="questions-container"></div>
</main>

<script>
const questions = [
  {
    text: "A multinational company employs various big data services including Amazon EMR for data processing and Amazon Athena for ad hoc querying. The company's data engineering team requires a unified metadata repository to store and access table schemas and properties across these services. The team also needs to integrate existing metadata from a legacy Apache Hive system into this unified repository.\n\nWhich approach should the data engineering team take to centralize their metadata with minimal development effort?",
    options: [
      "Implement AWS Lake Formation to manage metadata and govern data access.",
      "Utilize Amazon Athena's integration with the existing Hive metastore to import metadata directly.",
      "Leverage the AWS Glue Data Catalog as the centralized metadata repository.",
      "Set up an Amazon Aurora PostgreSQL-compatible database as a dedicated metadata store."
    ],
    correct: 2,
    feedback: {
      explanation: "The AWS Glue Data Catalog is a managed service that serves as a central metadata repository compatible with both Amazon EMR and Amazon Athena. It provides a persistent metadata store for table definitions, schemas, and other properties. The Glue Data Catalog can import metadata from Apache Hive with minimal effort, eliminating the need for manual configurations or additional infrastructure.",
      wrong: [
        { label: "AWS Lake Formation", reason: "Designed for building secure data lakes, but requires more development effort than directly using the AWS Glue Data Catalog, which is a built-in feature of Lake Formation." },
        { label: "Athena + Hive metastore", reason: "While Athena can integrate with an existing Hive metastore, the process is more complex and not as straightforward as using the AWS Glue Data Catalog." },
        { label: "Amazon Aurora PostgreSQL", reason: "Setting up a dedicated metastore on an RDS instance would require significant setup and maintenance, whereas the AWS Glue Data Catalog is fully managed." }
      ]
    }
  },
  {
    text: "A digital marketing agency collects customer interaction data through various cloud-based platforms and wants to analyze this data using Amazon Redshift. The data, sourced from multiple SaaS platforms, must be consolidated into an Amazon S3 bucket before analysis. The agency seeks the most straightforward and maintenance-light method to import this data into S3.\n\nWhich AWS service or feature should the agency use to streamline the transfer of data from the SaaS platforms to Amazon S3 with minimal operational effort?",
    options: [
      "Use Amazon EventBridge to route data from SaaS platforms to the S3 bucket.",
      "Use AWS Data Exchange to import third-party data directly into S3.",
      "Use Amazon AppFlow for no-code data transfer between SaaS applications and S3.",
      "Use the AWS Transfer Family to handle SaaS data ingestion into the S3 bucket."
    ],
    correct: 2,
    feedback: {
      explanation: "Amazon AppFlow is a fully managed integration service that enables secure, no-code data transfer between AWS services and SaaS applications. The agency can easily connect SaaS platforms to Amazon S3, set up data transfer flows, and schedule them without writing custom integration code or managing infrastructure.",
      wrong: [
        { label: "Amazon EventBridge", reason: "Primarily an event bus service designed to connect application data from various sources, not specifically tailored for direct data transfer from SaaS platforms to S3." },
        { label: "AWS Data Exchange", reason: "Mainly for finding, subscribing to, and using third-party data in the cloud. Doesn't cater to custom data transfer needs from a company's specific SaaS tools to S3." },
        { label: "AWS Transfer Family", reason: "Provides secure file transfers into and out of S3 using SFTP/FTPS/FTP, but not as direct or seamless for connecting SaaS applications compared to AppFlow." }
      ]
    }
  },
  {
    text: "A data engineer at a financial analysis firm is responsible for enriching their AWS-based data lake with external financial datasets. The firm requires regular updates of stock market data and economic indicators from various data providers, which should be integrated seamlessly into their Amazon S3-based data lake.\n\nWhich AWS service should the data engineer use to automate the ingestion of these external financial datasets into their data lake with minimal effort?",
    options: [
      "Set up a recurring AWS Lambda function to retrieve and upload data from third-party APIs to their S3 data lake.",
      "Use AWS Data Exchange to subscribe to relevant financial datasets and directly import them into their S3 data lake.",
      "Implement an AWS Glue crawler to extract data from external data sources and load it into the data lake.",
      "Configure Amazon AppFlow to create flows between the data providers and S3, syncing the financial datasets to the data lake."
    ],
    correct: 1,
    feedback: {
      explanation: "AWS Data Exchange makes it easy to find, subscribe to, and use third-party data in the cloud. The firm can set up AWS Data Exchange to automatically import datasets into Amazon S3, ensuring the data lake is regularly updated with minimal manual intervention.",
      wrong: [
        { label: "AWS Lambda", reason: "Would require additional development work to handle API integration, data retrieval, and error handling — more operationally complex than AWS Data Exchange." },
        { label: "AWS Glue crawler", reason: "Glue crawlers scan existing datasets and populate the Glue Data Catalog with metadata. They don't inherently retrieve new data from external providers." },
        { label: "Amazon AppFlow", reason: "Facilitates transfers between AWS and SaaS applications but isn't tailored for acquiring datasets from a marketplace like AWS Data Exchange." }
      ]
    }
  },
  {
    text: "A data engineer needs to perform a one-time extraction of a specific column from a large dataset in Apache Parquet format stored in an Amazon S3 bucket. The requirement is to accomplish this with minimal setup and execution time.\n\nWhich AWS service or feature should the data engineer use to query the single column from the Parquet files with the least operational overhead?",
    options: [
      "Utilize Amazon Athena to execute a SQL SELECT statement that retrieves the required column from the Parquet files in the S3 bucket.",
      "Use S3 Select to run a SQL SELECT statement to extract the required column from the S3 objects.",
      "Configure Amazon Redshift Spectrum to query the required column directly from the S3 bucket.",
      "Deploy an Amazon EMR cluster with Hive to perform a SELECT query on the column of the Parquet files stored in S3."
    ],
    correct: 1,
    feedback: {
      explanation: "S3 Select allows the data engineer to retrieve a subset of data from an object using simple SQL expressions. By enabling querying just the needed column directly within S3, there is no need to provision compute resources or set up additional services. Particularly useful for one-time tasks where a full ETL process is not required.",
      wrong: [
        { label: "Amazon Athena", reason: "Involves setting up a database, defining a table, and potentially running a crawler — more overhead compared to S3 Select for a one-time task." },
        { label: "Redshift Spectrum", reason: "Requires an active Redshift cluster and external table definitions. More suitable for ongoing analytics rather than one-time tasks." },
        { label: "Amazon EMR with Hive", reason: "Significant overhead for a one-time query task. Involves provisioning resources and configuring Hive, unnecessary when simpler options like S3 Select exist." }
      ]
    }
  },
  {
    text: "A company is integrating a business intelligence (BI) tool with their data warehouse hosted on Microsoft SQL Server. The BI team requires regular data extracts to be transformed and stored in Amazon S3 for further analysis. The BI team needs a solution to manage this ETL process efficiently and at a low cost.\n\nWhich AWS service or feature is the most cost-effective for orchestrating an ETL pipeline that extracts data from Microsoft SQL Server, transforms it, and loads it into Amazon S3?",
    options: [
      "AWS Data Pipeline",
      "AWS Glue workflows",
      "AWS Glue DataBrew",
      "AWS Batch"
    ],
    correct: 1,
    feedback: {
      explanation: "AWS Glue is a serverless data integration service. AWS Glue workflows enable creating and orchestrating ETL jobs that extract data from various data stores, transform it, and load it into Amazon S3. Because AWS Glue is serverless, you only pay for compute resources consumed while jobs are running — making it cost-effective.",
      wrong: [
        { label: "AWS Data Pipeline", reason: "Designed for reliable data transfer between AWS services and on-premises sources, but not as tightly integrated with Glue's modern ETL capabilities and may not be as cost-effective for complex transformations." },
        { label: "AWS Glue DataBrew", reason: "A visual data preparation tool focused on data preparation, not on orchestrating ETL workflows — which is what the question emphasizes." },
        { label: "AWS Batch", reason: "Enables running batch computing jobs but is more suited for batch processing workloads rather than the specific orchestration of ETL workflows." }
      ]
    }
  },
  {
    text: "A data engineer is tasked with setting up a schedule for running AWS Glue ETL jobs daily where the exact timing of job execution is not critical. The primary goal is to minimize the operational costs of these ETL jobs.\n\nWhat configuration option should the data engineer choose to optimize for cost without a specific requirement on job completion times?",
    options: [
      "Enable job bookmarking in AWS Glue job properties to ensure incremental data processing.",
      "Select the 'Job Timeout' option in AWS Glue job properties and set a longer duration to allow for cost-effective resource utilization.",
      "Choose the 'FLEX' execution class in the AWS Glue job properties to leverage spot capacity for running jobs.",
      "Apply a 'Job Delay' within AWS Glue job properties to schedule execution during non-peak hours for potential cost savings."
    ],
    correct: 2,
    feedback: {
      explanation: "The 'FLEX' execution class in AWS Glue is designed to run jobs at a lower cost by utilizing spot instances. When precise timing is not an issue, using 'FLEX' allows Glue to optimize job execution by taking advantage of spare capacity in the AWS cloud, which can be more cost-effective compared to on-demand instances.",
      wrong: [
        { label: "Job bookmarking", reason: "Helps save costs by processing only new or changed data, but does not inherently reduce the cost of compute resources used during execution." },
        { label: "Job Timeout", reason: "Manages how long a job can run before termination — not directly related to cost optimization through resource utilization." },
        { label: "Job Delay", reason: "Scheduling during non-peak hours might incidentally reduce costs, but doesn't leverage any specific AWS Glue feature designed for cost savings like 'FLEX'." }
      ]
    }
  },
  {
    text: "A data engineering team is working on migrating large datasets from an on-premises file server to AWS. Post-migration, they also need to ensure regular, ongoing data transfers between the on-premises server and Amazon S3 for incremental changes.\n\nWhich AWS service should the team use to facilitate this data transfer with the ability to schedule periodic syncs and ensure data is kept current in both locations?",
    options: [
      "Use AWS DataSync to automate data transfer between the on-premises file server and Amazon S3, with scheduling capabilities.",
      "Implement AWS Transfer Family to manage the transfer of files to and from Amazon S3 and the on-premises server.",
      "Configure an AWS Storage Gateway file gateway for real-time data transfer between on-premises environments and AWS storage services.",
      "Utilize Amazon S3 Transfer Acceleration to expedite the data transfer process from on-premises servers to Amazon S3."
    ],
    correct: 0,
    feedback: {
      explanation: "AWS DataSync is a data transfer service specifically designed to simplify and accelerate moving large volumes of data between on-premises storage systems and AWS storage services. It provides the ability to schedule periodic or one-time sync tasks, handles incremental changes, and can be used for both initial migrations and ongoing replication tasks.",
      wrong: [
        { label: "AWS Transfer Family", reason: "Facilitates secure file transfers using SFTP/FTPS/FTP but does not offer the same level of automation for handling ongoing data synchronization as DataSync." },
        { label: "AWS Storage Gateway", reason: "Better suited for scenarios where on-premises applications need cloud-backed storage. For large-scale migrations and scheduled transfers, DataSync is more appropriate." },
        { label: "S3 Transfer Acceleration", reason: "Ideal for speeding up transfers over long distances but doesn't provide orchestration and automation for scheduled, ongoing data transfers." }
      ]
    }
  },
  {
    text: "An enterprise is looking to automate its data processing workflows on AWS. Whenever a .csv file is uploaded to a specific Amazon S3 bucket, they want a serverless process to convert the file into Apache Parquet format. The goal is to minimize manual intervention and ensure that the process is triggered only by the upload of .csv files.\n\nWhat is the most efficient method for the data engineer to set up an AWS Lambda function that responds exclusively to the uploading of .csv files into an S3 bucket?",
    options: [
      "Set up an S3 event notification for s3:ObjectCreated:Put events, applying a suffix filter for .csv files and designating the Lambda function's ARN as the direct trigger.",
      "Configure an S3 Lifecycle policy to invoke the Lambda function for .csv files added to the bucket.",
      "Establish an Amazon EventBridge rule to trigger the Lambda function on any S3 put action, with a specific filter for .csv file prefixes.",
      "Implement an AWS Step Functions state machine that starts when a .csv file is uploaded to S3, and invoke the Lambda function as the initial step."
    ],
    correct: 0,
    feedback: {
      explanation: "Amazon S3 event notifications can be configured to respond to specific events such as the creation of a new object. By setting a suffix filter for .csv files, the S3 bucket will only invoke the Lambda function when a .csv file is uploaded — ensuring the transformation process is triggered automatically with the least operational overhead.",
      wrong: [
        { label: "S3 Lifecycle policy", reason: "Lifecycle policies are used for managing objects' lifecycles (archiving, deletion), not for triggering processing functions upon file upload." },
        { label: "Amazon EventBridge rule", reason: "EventBridge can monitor S3 activity, but it is not as direct or straightforward for triggering Lambda upon specific file uploads as S3 event notifications." },
        { label: "AWS Step Functions", reason: "A workflow service that could orchestrate the process, but it's more complex and introduces additional overhead compared to direct S3 event notifications." }
      ]
    }
  },
  {
    text: "A marketing analyst needs to combine customer data from several databases for a one-time comprehensive report. The data resides in Amazon DynamoDB, Amazon RDS, Amazon Redshift, and Amazon S3.\n\nWhich approach should the analyst use to join and analyze this data in the most cost-effective way for this one-time task?",
    options: [
      "Create an AWS Glue ETL job to consolidate data from all sources into Amazon S3 and analyze it using Amazon Athena.",
      "Create an Amazon EMR cluster with Apache Spark to read and join data from the various sources.",
      "Use Redshift Spectrum to execute queries across DynamoDB, RDS, Redshift, and S3 data.",
      "Use Amazon Athena Federated Query to join and analyze data from DynamoDB, RDS, Redshift, and S3."
    ],
    correct: 3,
    feedback: {
      explanation: "Amazon Athena Federated Query allows directly running SQL queries across multiple data sources without the need to move or replicate data. This is cost-effective for a one-time analysis job as it eliminates data transfer overhead. Athena's pay-per-query model and serverless nature also contribute to cost savings for ad-hoc or one-time analytical tasks.",
      wrong: [
        { label: "AWS Glue ETL", reason: "Viable but consolidating data from multiple sources into S3 introduces additional steps and potential costs for data movement — less efficient for a one-time task." },
        { label: "Amazon EMR with Spark", reason: "More resource-intensive and requires provisioning and managing a cluster — typically more suited for ongoing, large-scale processing rather than one-time queries." },
        { label: "Redshift Spectrum", reason: "Allows querying data in S3 from Redshift, but doesn't natively support DynamoDB and RDS. Additionally, managing a Redshift cluster may incur higher costs." }
      ]
    }
  },
  {
    text: "A research institute plans to migrate a large dataset from their on-premises data center to AWS. The dataset is stored on a Network Attached Storage (NAS) system and needs to be transferred securely and efficiently, with minimal downtime to ongoing research activities.\n\nWhich AWS service should the institute use for the migration of their on-premises dataset to AWS?",
    options: [
      "Use AWS DataSync to automate the transfer of data from the NAS system to AWS.",
      "Deploy AWS Storage Gateway to synchronize the NAS system data to Amazon S3.",
      "Create an AWS Direct Connect connection to transfer data to AWS.",
      "Configure an AWS Snowball device to physically transport the data to AWS."
    ],
    correct: 0,
    feedback: {
      explanation: "AWS DataSync is an online data transfer service that simplifies, automates, and accelerates moving data between on-premises storage systems and AWS storage services. It can securely and efficiently transfer large datasets from a NAS system to AWS (Amazon S3 or Amazon EFS), and can handle transfers over the internet or AWS Direct Connect, ensuring minimal downtime.",
      wrong: [
        { label: "AWS Storage Gateway", reason: "Typically used for integration with existing on-premises environments for backup and archival, rather than full-scale migration of large datasets." },
        { label: "AWS Direct Connect", reason: "Provides a dedicated network connection but does not by itself transfer data. More suitable for continuous, regular data transfer needs rather than a one-time migration." },
        { label: "AWS Snowball", reason: "A physical data transport solution suitable for extremely large amounts of data. However, it involves physical shipping of devices and could be more disruptive to ongoing activities." }
      ]
    }

      wrong: [

    options: [

// ── STATE ──
let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildExam() {
  document.getElementById('total-num').textContent = questions.length;
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  questions.forEach((q, qi) => {
    const letters = ['A','B','C','D'];
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${qi}`;

    const optionsHTML = q.options.map((opt, oi) => `
      <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
        <div class="option-letter">${letters[oi]}</div>
        <div class="option-text">${opt}</div>
        <div class="icon-mark"></div>
      </div>
    `).join('');

    const wrongList = q.feedback.wrong.map(w => `
      <p><span class="tag incorrect-tag">INCORRECTO</span><strong>${w.label}:</strong> ${w.reason}</p>
    `).join('');

    card.innerHTML = `
      <div class="q-num">Pregunta ${qi + 1} de ${questions.length}</div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="options">${optionsHTML}</div>
      <div class="feedback" id="fb-${qi}">
        <div class="feedback-header" id="fb-header-${qi}"></div>
        <div class="feedback-body">
          <p><span class="tag correct-tag">CORRECTO</span>${q.feedback.explanation}</p>
          ${wrongList}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  if (answered[qi]) return;
  answered[qi] = true;

  const q = questions[qi];
  const isCorrect = oi === q.correct;
  const letters = ['A','B','C','D'];

  // Style options
  q.options.forEach((_, idx) => {
    const el = document.getElementById(`opt-${qi}-${idx}`);
    el.classList.add('disabled');
    if (idx === q.correct) {
      el.classList.add('correct');
      el.querySelector('.icon-mark').textContent = '✓';
    } else if (idx === oi && !isCorrect) {
      el.classList.add('wrong');
      el.querySelector('.icon-mark').textContent = '✗';
    }
  });

  // Card style
  const card = document.getElementById(`q-${qi}`);
  card.classList.add('answered');
  if (isCorrect) card.classList.add('correct-card');

  // Show feedback
  const fb = document.getElementById(`fb-${qi}`);
  const fbHeader = document.getElementById(`fb-header-${qi}`);
  fb.classList.add('show');
  if (isCorrect) {
    fbHeader.className = 'feedback-header ok';
    fbHeader.innerHTML = '✓ &nbsp; Respuesta Correcta';
    correctCount++;
  } else {
    fbHeader.className = 'feedback-header fail';
    fbHeader.innerHTML = `✗ &nbsp; Incorrecto — la respuesta correcta era <strong>${letters[q.correct]}</strong>`;
  }

  // Update score
  document.getElementById('score-num').textContent = correctCount;
  updateProgress();
  checkComplete();
}

function updateProgress() {
  const done = answered.filter(Boolean).length;
  const pct = (done / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function checkComplete() {
  const done = answered.filter(Boolean).length;
  if (done === questions.length) {
    const panel = document.getElementById('results-panel');
    document.getElementById('final-correct').textContent = correctCount;
    document.getElementById('final-total').textContent = questions.length;
    const pct = Math.round((correctCount / questions.length) * 100);
    document.getElementById('final-pct').textContent = `${pct}% de respuestas correctas`;
    panel.classList.add('show');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function resetExam() {
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  document.getElementById('score-num').textContent = '0';
  document.getElementById('results-panel').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildExam();
</script>
