<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS DEA Domain 2 – Data Store Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --accent: #38bdf8;
    --accent2: #7dd3fc;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct-bg: rgba(34,197,94,0.08);
    --correct-border: rgba(34,197,94,0.3);
    --wrong-bg: rgba(239,68,68,0.06);
    --wrong-border: rgba(239,68,68,0.2);
    --selected-bg: rgba(56,189,248,0.09);
    --selected-border: rgba(56,189,248,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
    flex-wrap: wrap;
  }
  .aws-badge {
    background: var(--accent);
    color: #0d1117;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  header .sub { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .score-pill {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
  }
  #score-num { font-weight: 700; }
  .progress-bar-wrap { height: 3px; background: var(--border); width: 100%; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }
  main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--border);
    transition: background 0.3s;
  }
  .q-card.answered::before { background: var(--accent); }
  .q-card.correct-card::before { background: var(--green); }
  .q-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .multi-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: rgba(56,189,248,0.12);
    color: var(--accent);
    border: 1px solid rgba(56,189,248,0.3);
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .q-text { font-size: 15.5px; color: var(--text); margin-bottom: 24px; line-height: 1.7; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
    background: var(--bg);
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--selected-bg);
  }
  .option.selected { border-color: var(--selected-border); background: var(--selected-bg); }
  .option.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .option.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
  .option.disabled { cursor: default; pointer-events: none; }
  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.18s;
    margin-top: 1px;
  }
  .option.correct .option-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option.wrong .option-letter { background: var(--red); border-color: var(--red); color: #fff; }
  .option.selected:not(.correct):not(.wrong) .option-letter { background: var(--accent); border-color: var(--accent); color: #0d1117; }
  .option-text { font-size: 14.5px; color: var(--text); line-height: 1.5; }
  .icon-mark { margin-left: auto; min-width: 18px; opacity: 0; font-size: 16px; transition: opacity 0.2s; }
  .option.correct .icon-mark, .option.wrong .icon-mark { opacity: 1; }

  /* Multi-select submit button */
  .multi-submit {
    margin-top: 12px;
    display: none;
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 10px 22px;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    letter-spacing: 0.02em;
    transition: background 0.2s, opacity 0.2s;
  }
  .multi-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .multi-submit.visible { display: inline-block; }

  .feedback { display: none; margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .feedback.show { display: block; }
  .feedback-header {
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 600;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-header.ok { background: rgba(34,197,94,0.12); color: var(--green); }
  .feedback-header.fail { background: rgba(239,68,68,0.1); color: var(--red); }
  .feedback-body { padding: 16px; background: var(--surface2); }
  .feedback-body p { font-size: 13.5px; color: var(--muted); line-height: 1.65; margin-bottom: 8px; }
  .feedback-body p:last-child { margin-bottom: 0; }
  .feedback-body strong { color: var(--text); }
  .feedback-body .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 6px;
    font-weight: 600;
  }
  .tag.correct-tag { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag.incorrect-tag { background: rgba(239,68,68,0.12); color: var(--red); }

  #results-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin-bottom: 32px;
  }
  #results-panel.show { display: block; }
  #results-panel h2 { font-size: 26px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  #results-panel .final-score { font-family: 'IBM Plex Mono', monospace; font-size: 52px; font-weight: 700; color: var(--text); line-height: 1; margin: 16px 0; }
  #results-panel .final-score span { color: var(--accent); }
  #results-panel p { color: var(--muted); font-size: 14px; }
  .btn-reset {
    margin-top: 24px;
    display: inline-block;
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: var(--accent2); }
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    main { padding: 20px 12px 60px; }
    .q-card { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div><div class="aws-badge">AWS DEA-C01</div></div>
  <div>
    <h1>Data Store Management</h1>
    <div class="sub">Domain 2 · Practice Exam · Marco Antonio Camargo Funez</div>
  </div>
  <div class="score-pill">Score: <span id="score-num">0</span> / <span id="total-num">0</span></div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

<main>
  <div id="results-panel">
    <h2>¡Examen completado!</h2>
    <div class="final-score"><span id="final-correct">0</span> / <span id="final-total">0</span></div>
    <p id="final-pct"></p>
    <button class="btn-reset" onclick="resetExam()">Reiniciar examen</button>
  </div>
  <div id="questions-container"></div>
</main>

<script>
const questions = [
  {
    text: "A data engineering team is developing a new application that requires intermittent access to a relational database. The application's usage is expected to have unpredictable peaks and valleys. The team stores the application data in Amazon S3 and needs an on-demand relational database solution that can automatically scale to match the application's workload and minimize operational management and cost.\n\nWhich AWS service should the data engineering team use to meet the application's database requirements with auto-scaling capabilities and direct integration with Amazon S3?",
    options: [
      "Configure Amazon RDS with a scaling policy to adjust the compute resources based on the application's workload.",
      "Implement Amazon Redshift with automatic pause and resume based on the activity levels to optimize cost and performance.",
      "Use Amazon Aurora Serverless with an S3 integration, enabling the database to scale automatically with the application's demand.",
      "Set up an Amazon DynamoDB table with auto-scaling enabled and stream data from S3 using AWS Lambda functions for relational database-like operations."
    ],
    correct: [2],
    feedback: {
      explanation: "Amazon Aurora Serverless is a fully managed database service that automatically starts up, shuts down, and scales capacity up or down based on your application's needs. It's designed for applications with unpredictable workloads, and it integrates with Amazon S3, allowing easy data import/export. It suits the team's need for a relational database with minimal operational overhead and cost-efficiency.",
      wrong: [
        { label: "Amazon RDS with scaling policy", reason: "RDS does allow for scaling, but it does not automatically adjust compute resources in real-time in response to active connections, which means it could either under-provision or over-provision resources." },
        { label: "Amazon Redshift", reason: "Redshift is optimized for complex analytical queries over large datasets rather than serving as an on-demand operational database." },
        { label: "Amazon DynamoDB", reason: "DynamoDB is a NoSQL service and does not provide relational database features natively. Complex workarounds would be needed to mimic relational operations." }
      ]
    }
  },
  {
    text: "A manufacturing company plans to migrate their on-premises data, currently stored in an SMB (Server Message Block) file share, to AWS for improved scalability and data analysis capabilities. The data migration must be efficient, secure, and minimize downtime.\n\nWhich AWS service should the company use to facilitate the transfer of their SMB file share data to the cloud?",
    options: [
      "Use AWS DataSync to automate and accelerate the transfer of data from the SMB file share to Amazon S3.",
      "Implement AWS Storage Gateway with a File Gateway configuration to connect the SMB file share to AWS.",
      "Deploy AWS Snowball Edge for large-scale data transfer from the SMB file share to AWS.",
      "Configure AWS Direct Connect to create a dedicated network connection for data transfer from the SMB share to Amazon S3."
    ],
    correct: [0],
    feedback: {
      explanation: "AWS DataSync is a data transfer service designed to simplify and accelerate moving large amounts of data between on-premises storage systems (like SMB file shares) and AWS storage services (such as Amazon S3). It handles the transfer securely, efficiently, and with minimal operational overhead, offering features like scheduling, data validation, and bandwidth throttling.",
      wrong: [
        { label: "AWS Storage Gateway (File Gateway)", reason: "File Gateway is more commonly used for hybrid cloud storage scenarios rather than a complete migration. It allows on-premises applications to use cloud storage through SMB or NFS protocols." },
        { label: "AWS Snowball Edge", reason: "A physical device suitable for situations where network conditions are not ideal for online data transfer. May not be necessary if network bandwidth is sufficient for online transfer using DataSync." },
        { label: "AWS Direct Connect", reason: "Provides a dedicated network connection to AWS but does not by itself facilitate the data transfer process. Would typically be used in conjunction with a data transfer service like DataSync." }
      ]
    }
  },
  {
    text: "A large financial institution plans to migrate several terabytes of critical financial data from its on-premises data center to AWS for analysis and long-term storage. The migration needs to be secure, consistent, and should have minimal impact on the institution's existing network bandwidth.\n\nWhich AWS service should the institution use to migrate this large volume of data while ensuring network security and minimal impact on existing bandwidth?",
    options: [
      "Use AWS Snowball to physically transfer the data to AWS.",
      "Implement AWS Direct Connect for a dedicated network connection to AWS.",
      "Utilize Amazon S3 Transfer Acceleration for faster data upload over the internet.",
      "Configure a VPN connection over the internet to securely transfer the data to AWS."
    ],
    correct: [1],
    feedback: {
      explanation: "AWS Direct Connect provides a dedicated network connection between the on-premises data center and AWS, enabling the transfer of large volumes of data securely and consistently. It offers a more reliable and consistent network experience compared to internet-based connections, reducing network costs, increasing bandwidth throughput, and minimizing the impact on the institution's existing internet bandwidth.",
      wrong: [
        { label: "AWS Snowball", reason: "A data transport solution that involves physical shipping of data. While suitable for large data migrations, it may not be the best choice for scenarios requiring a continuous and consistent data transfer process." },
        { label: "Amazon S3 Transfer Acceleration", reason: "Enables faster transfers over long distances but doesn't provide the same level of dedicated bandwidth and consistent network performance as AWS Direct Connect." },
        { label: "VPN connection", reason: "A VPN can secure data transfer to AWS, but may not provide the bandwidth efficiency needed for transferring several terabytes of data. It uses the public internet, which can be less reliable and slower than Direct Connect." }
      ]
    }
  },
  {
    text: "A media company has a workflow where high-resolution videos are uploaded to an Amazon S3 bucket. Once a video is uploaded, it needs to be processed immediately to create lower-resolution versions. The company wants to automate this process so that as soon as a video is uploaded to the S3 bucket, an AWS Lambda function is triggered to start the processing.\n\nWhich AWS service should the company use to automatically trigger the Lambda function upon video upload to the S3 bucket?",
    options: [
      "Use Amazon S3 Event Notifications to directly invoke the Lambda function when a new video is uploaded.",
      "Configure Amazon CloudWatch Events to detect the S3 upload event and trigger the Lambda function.",
      "Implement Amazon Kinesis Data Streams to capture upload events and trigger the Lambda function.",
      "Set up AWS Step Functions to orchestrate the process, triggering the Lambda function upon S3 object upload."
    ],
    correct: [0],
    feedback: {
      explanation: "Amazon S3 Event Notifications is the most suitable service for this requirement. It can be configured to trigger a Lambda function automatically when a new object is uploaded to an S3 bucket. This direct integration between S3 and Lambda is efficient for real-time processing of new objects, making the workflow automated and seamless.",
      wrong: [
        { label: "Amazon CloudWatch Events", reason: "Can respond to S3 object-level operations, but it is a more indirect method compared to using S3 Event Notifications, which provide a more straightforward and immediate way to trigger Lambda functions upon object upload." },
        { label: "Amazon Kinesis Data Streams", reason: "Primarily used for real-time data streaming and processing but is not necessary for triggering a Lambda function based on S3 object uploads. This approach would add unnecessary complexity." },
        { label: "AWS Step Functions", reason: "A workflow service for orchestrating various AWS services. For the specific need to trigger a Lambda function upon an S3 object upload, Step Functions would be an overcomplication." }
      ]
    }
  },
  {
    text: "A data engineering team is building a system that processes various types of events generated by different applications within their organization. The system needs to route these events to specific AWS services for processing and analysis based on the event type. The solution must be scalable and able to handle many events efficiently.\n\nWhich AWS service should the data engineering team use to route these events to the appropriate AWS services based on the type of event?",
    options: [
      "Use Amazon Kinesis Data Streams to filter and route the events to different AWS services.",
      "Use Amazon EventBridge to route events to target AWS services based on rules.",
      "Use AWS Lambda to manually parse and dispatch events to other AWS services.",
      "Use AWS Step Functions to orchestrate the event routing process to various AWS services."
    ],
    correct: [1],
    feedback: {
      explanation: "Amazon EventBridge is an ideal choice for this scenario. It is a serverless event bus service that enables applications to communicate with each other using events. EventBridge can capture events from various sources (like applications, AWS services, and external services) and routes them to the appropriate targets based on content-based rules, supporting scalable processing of many events.",
      wrong: [
        { label: "Amazon Kinesis Data Streams", reason: "Effective for real-time data streaming and processing but is not primarily designed for routing events based on type or content. It lacks the built-in routing capabilities based on event patterns that EventBridge offers." },
        { label: "AWS Lambda", reason: "Using Lambda to manually parse and route events would require more development effort and might not scale as efficiently as a dedicated event routing service like EventBridge." },
        { label: "AWS Step Functions", reason: "A service for orchestrating microservices, workflows, and processes, but it is not optimal for event routing based on event types. More suited for coordinating complex workflows." }
      ]
    }
  },
  {
    text: "A mobile app development company is creating an application that allows users to upload and retrieve photos. The photos will be stored in Amazon S3. The company needs to decide on the best approach to integrate the S3 service into their application for handling these photo uploads and retrievals.\n\nWhich approach should the company use to integrate Amazon S3 in their mobile application for uploading and retrieving photos?",
    options: [
      "Directly use the Amazon S3 API in the application code for uploading and retrieving photos.",
      "Implement Amazon EC2 instances to act as intermediaries for S3 operations.",
      "Set up AWS Step Functions to manage the workflow of uploading and retrieving photos from S3.",
      "Use AWS Lambda functions triggered by Amazon API Gateway to handle photo uploads and retrievals with S3."
    ],
    correct: [3],
    feedback: {
      explanation: "Using Amazon API Gateway in conjunction with AWS Lambda provides several benefits. API Gateway acts as a front door to manage all the API calls, ensuring scalability, security, and efficiency. It allows the company to control access to their S3 operations, manage traffic, authorize requests, and handle different versions of the API. Lambda processes the upload and retrieval requests, interfacing with Amazon S3. This serverless architecture is cost-effective and scales automatically.",
      wrong: [
        { label: "Direct Amazon S3 API", reason: "Directly using the Amazon S3 API in the application exposes the S3 service directly to the client, which could lead to security risks and less control over the traffic and operations." },
        { label: "Amazon EC2 intermediaries", reason: "Using EC2 instances as intermediaries introduces unnecessary complexity and cost. It requires maintaining and scaling EC2 instances, which is more resource-intensive compared to the serverless approach." },
        { label: "AWS Step Functions", reason: "Step Functions is used to coordinate multiple AWS services into serverless workflows but is not typically used for direct interactions like file uploads and retrievals. It would add unnecessary complexity." }
      ]
    }
  },
  {
    text: "A software development team is deploying an application on Amazon Elastic Container Service (ECS) using Fargate. The application requires persistent storage to manage stateful data. The team needs to select an appropriate storage solution that can be attached to the ECS containers.\n\nWhich storage option should the team use for persistent storage with their ECS containers on Fargate?",
    options: [
      "Attach Amazon Elastic Block Store (EBS) volumes directly to the ECS containers.",
      "Use Amazon Elastic File System (EFS) volumes with the ECS containers.",
      "Use Amazon S3 buckets by mounting them directly onto the ECS containers.",
      "Implement instance store volumes provided by the underlying EC2 instances of Fargate."
    ],
    correct: [1],
    feedback: {
      explanation: "Amazon Elastic File System (EFS) is the suitable choice for providing persistent storage to containers running on Amazon ECS using Fargate. EFS is a fully managed, scalable file storage that can be attached to multiple ECS containers, allowing them to share the same file system. This is ideal for stateful applications that require shared or persistent storage across tasks or services in ECS.",
      wrong: [
        { label: "Amazon EBS", reason: "EBS volumes cannot be directly attached to ECS containers, especially in the Fargate launch type. EBS is primarily used with EC2 instances and is not suitable for container-based architectures where containers might be rescheduled on different underlying infrastructure." },
        { label: "Amazon S3 buckets", reason: "Amazon S3 is an object storage service and cannot be directly mounted onto ECS containers as a file system. While S3 can be used for storing and retrieving data, it is not designed to serve as attached storage for containers." },
        { label: "Instance store volumes", reason: "Fargate does not provide direct access to the underlying EC2 instance store volumes, as it abstracts the underlying infrastructure management. Instance store volumes are ephemeral and tied to the lifecycle of an EC2 instance." }
      ]
    }
  },
  {
    text: "A software company is developing a web-based application that will be deployed on multiple Amazon EC2 instances in an Auto Scaling group. The application requires a shared file system that can be accessed concurrently by all EC2 instances for reading and writing data. The file system must also support high availability and scalability.\n\nWhich AWS storage service should the software company use to meet these requirements?",
    options: [
      "Use Amazon S3 to provide a scalable object storage solution.",
      "Implement Amazon Elastic Block Store (EBS) with shared volumes.",
      "Use Amazon Elastic File System (EFS) for a scalable, shared file storage system.",
      "Deploy Amazon EC2 instance store volumes for temporary, high-performance storage."
    ],
    correct: [2],
    feedback: {
      explanation: "Amazon EFS is the optimal choice. EFS provides a fully managed elastic NFS file system designed to be highly available and scalable, making it suitable for scenarios where multiple EC2 instances need concurrent access to a shared file system. EFS is particularly well-suited for use with EC2 instances in an Auto Scaling group, as it allows all instances to read and write to the same file system simultaneously.",
      wrong: [
        { label: "Amazon S3", reason: "S3 is an object storage service and does not function as a traditional file system. It is not suitable for use cases requiring a shared file system with file locking and concurrent read/write capabilities." },
        { label: "Amazon EBS with shared volumes", reason: "EBS volumes are generally used for single instance storage and do not natively support being attached to multiple EC2 instances simultaneously for a shared file system setup." },
        { label: "EC2 instance store volumes", reason: "Instance store volumes provide temporary block-level storage for EC2 instances, tied to the lifecycle of the instance, and are not suitable for persistent storage needs or shared file access across multiple EC2 instances." }
      ]
    }
  },
  {
    text: "A DevOps team is responsible for monitoring and troubleshooting a fleet of EC2 instances running web applications in AWS. They need an efficient way to analyze and query the log data generated by these applications, which are stored in Amazon CloudWatch Logs. The team wants to quickly identify errors and understand usage patterns through log analysis.\n\nWhich AWS service or feature should the DevOps team use for effective real-time analysis and querying of log data stored in Amazon CloudWatch Logs?",
    options: [
      "Implement AWS X-Ray for in-depth analysis and tracing of application logs.",
      "Set up Amazon Athena to query log data directly from CloudWatch Logs.",
      "Configure Amazon Elasticsearch Service for log analytics and visualization.",
      "Use CloudWatch Logs Insights to perform queries and analyze the log data."
    ],
    correct: [3],
    feedback: {
      explanation: "CloudWatch Logs Insights is the most suitable tool for the DevOps team's requirements. It provides an interactive interface to query and analyze log data stored in CloudWatch Logs, enabling the team to execute complex queries on their log data, helping them efficiently analyze and visualize operational data. It's particularly useful for identifying trends, pinpointing errors, and extracting valuable insights.",
      wrong: [
        { label: "AWS X-Ray", reason: "X-Ray is more focused on providing insights into the performance of distributed applications and services, rather than log analysis. It is used for tracing requests through distributed systems, not specifically for querying and analyzing log data." },
        { label: "Amazon Athena", reason: "Athena is more suited for querying data stored in Amazon S3 and does not offer the real-time log analytics capabilities provided by CloudWatch Logs Insights for logs stored in CloudWatch." },
        { label: "Amazon Elasticsearch Service", reason: "Powerful for log analytics and visualization, but involves setting up and managing an Elasticsearch cluster. CloudWatch Logs Insights offers a more direct and integrated solution within the AWS ecosystem." }
      ]
    }
  },
  {
    text: "A social media company uses an Amazon DynamoDB table to store user activity logs. The logs are only relevant for 30 days for analytical purposes. After 30 days, these logs are no longer needed and should be automatically deleted to save storage costs.\n\nWhat steps should the company take to automatically remove outdated logs from the DynamoDB table after 30 days?",
    options: [
      "Configure an AWS Lambda function to periodically scan the DynamoDB table and delete items older than 30 days.",
      "Use Amazon DynamoDB Streams to trigger a deletion process for items that are 30 days old.",
      "Implement an Amazon S3 Lifecycle policy to remove data from the DynamoDB table after 30 days.",
      "Set up a Time To Live (TTL) attribute on the DynamoDB table and configure it to expire items after 30 days."
    ],
    correct: [3],
    feedback: {
      explanation: "Implementing a TTL (Time To Live) attribute in Amazon DynamoDB is the most efficient way to automatically delete items after a specific period. The company should add a TTL attribute to their DynamoDB table holding the expiration timestamp for each item (creation time plus 30 days). DynamoDB will then automatically delete items once the TTL value is reached, without incurring additional costs or manual intervention.",

// ── STATE ──
let answered = new Array(questions.length).fill(false);
let multiSelected = questions.map(q => new Set());
let correctCount = 0;

function isMulti(qi) {
  return questions[qi].correct.length > 1;
}

function buildExam() {
  document.getElementById('total-num').textContent = questions.length;
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  questions.forEach((q, qi) => {
    const letters = ['A','B','C','D','E'];
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${qi}`;

    const multi = isMulti(qi);

    const optionsHTML = q.options.map((opt, oi) => `
      <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
        <div class="option-letter">${letters[oi]}</div>
        <div class="option-text">${opt}</div>
        <div class="icon-mark"></div>
      </div>
    `).join('');

    const wrongList = q.feedback.wrong.map(w => `
      <p><span class="tag incorrect-tag">INCORRECTO</span><strong>${w.label}:</strong> ${w.reason}</p>
    `).join('');

    card.innerHTML = `
      <div class="q-badge">
        <div class="q-num">Pregunta ${qi + 1} de ${questions.length}</div>
        ${multi ? '<div class="multi-badge">SELECCIONA DOS</div>' : ''}
      </div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="options">${optionsHTML}</div>
      ${multi ? `<button class="multi-submit visible" id="submit-${qi}" onclick="submitMulti(${qi})" disabled>Confirmar respuesta</button>` : ''}
      <div class="feedback" id="fb-${qi}">
        <div class="feedback-header" id="fb-header-${qi}"></div>
        <div class="feedback-body">
          <p><span class="tag correct-tag">CORRECTO</span>${q.feedback.explanation}</p>
          ${wrongList}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  if (answered[qi]) return;
  const q = questions[qi];
  const multi = isMulti(qi);

  if (!multi) {
    // Single select: answer immediately
    answered[qi] = true;
    const isCorrect = q.correct[0] === oi;
    const letters = ['A','B','C','D','E'];
    q.options.forEach((_, idx) => {
      const el = document.getElementById(`opt-${qi}-${idx}`);
      el.classList.add('disabled');
      if (q.correct.includes(idx)) {
        el.classList.add('correct');
        el.querySelector('.icon-mark').textContent = '✓';
      } else if (idx === oi && !isCorrect) {
        el.classList.add('wrong');
        el.querySelector('.icon-mark').textContent = '✗';
      }
    });
    const card = document.getElementById(`q-${qi}`);
    card.classList.add('answered');
    if (isCorrect) { card.classList.add('correct-card'); correctCount++; }
    showFeedback(qi, isCorrect, letters[q.correct[0]]);
    updateProgress();
    checkComplete();
  } else {
    // Multi-select: toggle selection
    const el = document.getElementById(`opt-${qi}-${oi}`);
    if (multiSelected[qi].has(oi)) {
      multiSelected[qi].delete(oi);
      el.classList.remove('selected');
      el.querySelector('.option-letter').style.background = '';
      el.querySelector('.option-letter').style.borderColor = '';
      el.querySelector('.option-letter').style.color = '';
    } else {
      multiSelected[qi].add(oi);
      el.classList.add('selected');
    }
    const btn = document.getElementById(`submit-${qi}`);
    btn.disabled = multiSelected[qi].size !== q.correct.length;
  }
}

function submitMulti(qi) {
  if (answered[qi]) return;
  answered[qi] = true;
  const q = questions[qi];
  const letters = ['A','B','C','D','E'];
  const selected = Array.from(multiSelected[qi]);
  const correctSet = new Set(q.correct);
  const isCorrect = selected.length === q.correct.length && selected.every(s => correctSet.has(s));

  q.options.forEach((_, idx) => {
    const el = document.getElementById(`opt-${qi}-${idx}`);
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (q.correct.includes(idx)) {
      el.classList.add('correct');
      el.querySelector('.icon-mark').textContent = '✓';
    } else if (selected.includes(idx) && !q.correct.includes(idx)) {
      el.classList.add('wrong');
      el.querySelector('.icon-mark').textContent = '✗';
    }
  });

  const card = document.getElementById(`q-${qi}`);
  card.classList.add('answered');
  if (isCorrect) { card.classList.add('correct-card'); correctCount++; }
  document.getElementById(`submit-${qi}`).style.display = 'none';

  const correctLabels = q.correct.map(i => letters[i]).join(' y ');
  showFeedback(qi, isCorrect, correctLabels);
  updateProgress();
  checkComplete();
}

function showFeedback(qi, isCorrect, correctLabels) {
  const fb = document.getElementById(`fb-${qi}`);
  const fbHeader = document.getElementById(`fb-header-${qi}`);
  fb.classList.add('show');
  if (isCorrect) {
    fbHeader.className = 'feedback-header ok';
    fbHeader.innerHTML = '✓ &nbsp; Respuesta Correcta';
    document.getElementById('score-num').textContent = correctCount;
  } else {
    fbHeader.className = 'feedback-header fail';
    fbHeader.innerHTML = `✗ &nbsp; Incorrecto — la respuesta correcta era <strong>${correctLabels}</strong>`;
    document.getElementById('score-num').textContent = correctCount;
  }
}

function updateProgress() {
  const done = answered.filter(Boolean).length;
  document.getElementById('progress-bar').style.width = (done / questions.length * 100) + '%';
}

function checkComplete() {
  const done = answered.filter(Boolean).length;
  if (done === questions.length) {
    const panel = document.getElementById('results-panel');
    document.getElementById('final-correct').textContent = correctCount;
    document.getElementById('final-total').textContent = questions.length;
    const pct = Math.round((correctCount / questions.length) * 100);
    document.getElementById('final-pct').textContent = `${pct}% de respuestas correctas`;
    panel.classList.add('show');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function resetExam() {
  answered = new Array(questions.length).fill(false);
  multiSelected = questions.map(() => new Set());
  correctCount = 0;
  document.getElementById('score-num').textContent = '0';
  document.getElementById('results-panel').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildExam();
</script>
